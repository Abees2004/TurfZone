{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .checkout-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 6px;
        }
        .checkout-summary {
            margin-bottom: 20px;
        }
        .btn-pay {
            background-color: #528FF0;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-pay:hover {
            background-color: #3d6fc1;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Checkout</h1>

        <div class="checkout-summary">
            <p><strong>Order:</strong> {{ order_description }}</p>
            <p><strong>Amount:</strong> ₹{{ amount_display }}</p>
        </div>

        <button id="rzp-button1" class="btn-pay">Pay Now with Razorpay</button>
    </div>

    <script>
        document.getElementById('rzp-button1').onclick = function(e){

            e.preventDefault();

            var options = {
                "key": "{{ razorpay_key_id }}", 
                "amount": "{{ amount_paise }}", 
                "currency": "INR",
                "name": "{{ store_name|default:'Your Store Name' }}",
                "description": "{{ order_description|default:'Order Payment' }}",
                "image": "{{ store_logo_url|default:'' }}", 
                "order_id": "{{ razorpay_order_id }}",
                "handler": function (response){
                    fetch("{% url 'payment_handler' %}", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: JSON.stringify({
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    })
                    .then(resp => resp.json())
                    .then(data => {
                        if (data.status === "success") {
                            alert("Payment successful!");
                            window.location.href = "{% url 'payment_success' %}";
                        } else {
                            alert("Payment verification failed. Please try again.");
                        }
                    })
                    .catch(error => {
                        console.error("Error in payment handler:", error);
                        alert("Something went wrong. Please try again.");
                    });
                },
                "prefill": {
                    "name": "{{ user_name|default:'' }}",
                    "email": "{{ user_email|default:'' }}",
                    "contact": "{{ user_contact|default:'' }}"
                },
                "theme": {
                    "color": "#528FF0"
                }
            };

            var rzp1 = new Razorpay(options);
            rzp1.on('payment.failed', function (response){
                // optionally handle failure
                console.error(response.error);
                alert("Payment failed: " + response.error.description);
            });

            rzp1.open();
        }
    </script>
</body>
</html>
