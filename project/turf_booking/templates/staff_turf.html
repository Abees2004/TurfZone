<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Turfs - Turf Owner Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #28a745; /* A vibrant turf green */
            --bs-success: #20c997;
            --bs-info: #0dcaf0;
            --bs-warning: #ffc107;
            --bs-danger: #dc3545;
            --bs-font-sans-serif: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--bs-font-sans-serif);
            background-color: var(--bs-light-bg-subtle);
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            background-color: var(--bs-body-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background-color: var(--bs-tertiary-bg);
            border-right: 1px solid var(--bs-border-color-translucent);
            transition: all 0.3s ease-in-out;
            transform: translateX(0);
        }
        .sidebar.collapsed {
            transform: translateX(-250px);
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 1050;
                transform: translateX(-250px);
            }
            .sidebar.show {
                transform: translateX(0);
            }
        }
        .sidebar .list-group-item {
            border: none;
            color: var(--bs-body-color);
            background-color: transparent;
            font-weight: 500;
        }
        .sidebar .list-group-item.active,
        .sidebar .list-group-item:hover {
            background-color: var(--bs-primary);
            color: var(--bs-white);
            border-radius: 5px;
        }
        .sidebar .list-group-item i {
            font-size: 1.25rem;
        }
        .sidebar .list-group-item.active {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
        }

        /* Card Enhancements */
        .card {
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-img-top {
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
        }
        .card-body-icon {
            font-size: 2.5rem;
            opacity: 0.7;
        }
        .card-text {
            color: var(--bs-body-color);
            opacity: 0.8;
        }

        /* Navbar Enhancements */
        .navbar {
            background-color: var(--bs-tertiary-bg) !important;
            border-bottom: 1px solid var(--bs-border-color-translucent);
        }
        .form-control.search-box {
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">

        <div class="sidebar d-flex flex-column p-3" id="sidebar">
            <div class="d-flex align-items-center mb-4">
                <img src="https://via.placeholder.com/40" alt="Logo" class="rounded-circle me-3">
                <h5 class="my-0">Turf Owner</h5>
            </div>
            <div class="list-group flex-grow-1">
                <a href="{% url 'staff_dashboard' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-house-door-fill me-3"></i>
                    Dashboard
                </a>
                <a href="{% url 'staff_turflist' %}" class="list-group-item d-flex align-items-center active">
                    <i class="bi bi-geo-alt-fill me-3"></i>
                    My Turfs
                </a>
                <a href="{% url 'staff_bookingslist' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-calendar-check-fill me-3"></i>
                    Bookings
                </a>
                <!-- <a href="#schedule" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-clock-fill me-3"></i>
                    Availability
                </a>
                <a href="#pricing" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-tags-fill me-3"></i>
                    Pricing
                </a> -->
                <a href="{% url 'staff_profile' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-person-circle me-3"></i>
                    My Profile
                </a>
                <a href="{% url 'staff_addnewturf' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-chat-dots-fill me-3"></i>
                    Add Turf
                </a>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-auto p-3 border-top">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                    <label class="form-check-label" for="theme-toggle">Dark Mode</label>
                </div>
                <a href="{% url 'logout_view' %}" class="btn btn-outline-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
        <div class="main-content">
            <nav class="navbar navbar-expand-lg rounded-3 mb-4 sticky-top">
                <div class="container-fluid">
                    <button class="btn btn-outline-secondary d-md-none me-3" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-expanded="false" aria-controls="sidebar">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="d-none d-lg-block">
                        <form class="d-flex" role="search">
                            <input class="form-control search-box me-2" type="search" placeholder="Search..." aria-label="Search">
                        </form>
                    </div>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="https://via.placeholder.com/30" alt="Profile" class="rounded-circle me-2"> Turf Owner
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">My Turfs</h1>
                <a href="{% url 'staff_addnewturf' %}" class="btn btn-primary">
                    <i class="bi bi-plus-circle-fill me-2"></i> Add New Turf
                </a>
            </div>

            <div class="row g-4">
                {% for turf in turfs%}
                <div class="col-lg-4 col-md-6 col-sm-12">
                    
                    <div class="card h-100">
                        <img src="{{ turf.image.url }}" class="card-img-top" alt="Royal Turf Stadium">
                        <a href="{% url 'staff_turfcheckout' turf.id %}" class="text-decoration-none">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">{{turf.name}}</h5>
                            <p class="card-text text-muted"><i class="bi bi-geo-alt-fill me-2"></i>{{turf.location}}</p>
                            <div class="mt-3">
                                <a href="{% url 'staff_editturf' turf.id %}" class="btn btn-sm btn-primary me-2"><i class="bi bi-pencil-fill me-1"></i> Edit</a>
                                <a href="{% url 'staff_turfcheckout' turf.id %}" class="btn btn-sm btn-outline-info me-2"><i class="bi bi-info-circle-fill me-1"></i> Details</a>
                                <a href="{% url 'staff_turfallbookings' turf.id %}" class="btn btn-sm btn-outline-success"><i class="bi bi-calendar-check-fill me-1"></i> Bookings</a>
                            </div>
                        </div>
                        </a>
                    </div>
                </div>
                {% endfor %}


            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple JS for theme toggle
        document.getElementById('theme-toggle').addEventListener('change', function() {
            if (this.checked) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-bs-theme', 'light');
            }
        });

        // Simple JS for toggling the sidebar on small screens
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.querySelector('[data-bs-target="#sidebar"]');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('show');
            });
        }
    </script>
</body>
</html>
