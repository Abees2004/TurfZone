<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Turf Owner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #28a745; /* A vibrant turf green */
            --bs-success: #20c997;
            --bs-info: #0dcaf0;
            --bs-warning: #ffc107;
            --bs-danger: #dc3545;
            --bs-font-sans-serif: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--bs-font-sans-serif);
            background-color: var(--bs-light-bg-subtle);
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            background-color: var(--bs-body-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background-color: var(--bs-tertiary-bg);
            border-right: 1px solid var(--bs-border-color-translucent);
            transition: all 0.3s ease-in-out;
            transform: translateX(0);
        }
        .sidebar.collapsed {
            transform: translateX(-250px);
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 1050;
                transform: translateX(-250px);
            }
            .sidebar.show {
                transform: translateX(0);
            }
        }
        .sidebar .list-group-item {
            border: none;
            color: var(--bs-body-color);
            background-color: transparent;
            font-weight: 500;
        }
        .sidebar .list-group-item.active,
        .sidebar .list-group-item:hover {
            background-color: var(--bs-primary);
            color: var(--bs-white);
            border-radius: 5px;
        }
        .sidebar .list-group-item i {
            font-size: 1.25rem;
        }
        .sidebar .list-group-item.active {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
        }

        /* Card Enhancements */
        .card {
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-body-icon {
            font-size: 2.5rem;
            opacity: 0.7;
        }

        /* Navbar Enhancements */
        .navbar {
            background-color: var(--bs-tertiary-bg) !important;
            border-bottom: 1px solid var(--bs-border-color-translucent);
        }
        .form-control.search-box {
            border-radius: 20px;
        }
        
        /* Profile specific styling */
        .profile-pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--bs-primary);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">

        <div class="sidebar d-flex flex-column p-3" id="sidebar">
            <div class="d-flex align-items-center mb-4">
                <img src="https://via.placeholder.com/40" alt="Logo" class="rounded-circle me-3">
                <h5 class="my-0">Turf Owner</h5>
            </div>
            <div class="list-group flex-grow-1">
                <a href="{% url 'staff_dashboard' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-house-door-fill me-3"></i>
                    Dashboard
                </a>
                <a href="{% url 'staff_turflist' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-geo-alt-fill me-3"></i>
                    My Turfs
                </a>
                <a href="{% url 'staff_bookingslist' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-calendar-check-fill me-3"></i>
                    Bookings
                </a>
                <a href="{% url 'staff_profile' %}" class="list-group-item d-flex align-items-center active">
                    <i class="bi bi-person-circle me-3"></i>
                    My Profile
                </a>
                <a href="{% url 'staff_addnewturf' %}" class="list-group-item d-flex align-items-center">
                    <i class="bi bi-plus-circle-fill me-3"></i>
                    Add Turf
                </a>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-auto p-3 border-top">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                    <label class="form-check-label" for="theme-toggle">Dark Mode</label>
                </div>
                <a href="{% url 'logout_view' %}" class="btn btn-outline-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
        
        <div class="main-content">
            <nav class="navbar navbar-expand-lg rounded-3 mb-4 sticky-top">
                <div class="container-fluid">
                    <button class="btn btn-outline-secondary d-md-none me-3" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-expanded="false" aria-controls="sidebar">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="d-none d-lg-block">
                        <form class="d-flex" role="search">
                            <input class="form-control search-box me-2" type="search" placeholder="Search..." aria-label="Search">
                        </form>
                    </div>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="#" alt="Profile" class="rounded-circle me-2"> {{user.username}}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>

            <h1 class="mb-4">My Profile</h1>

            <div class="card p-4">
                <div class="row g-4">
                    <div class="col-md-3 text-center">
                        {% if user.image %}
                        <img src="{{user.image.url}}" alt="Profile Picture" class="profile-pic mb-3">
                        {% else %}
                        <img src="" alt="Profile Picture" class="profile-pic mb-3">
                        {% endif %}
                        <!-- <div class="mt-2">
                            <label for="profileImage" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-cloud-upload me-2"></i>Change Photo
                            </label>
                            <input type="file" id="profileImage" style="display: none;">
                        </div> -->
                    </div>

                    <div class="col-md-9">
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" readonly value="{{user.username}}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" readonly value="{{user.email}}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="phoneNumber" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phoneNumber" value="{{user.phno}}">
                                </div>
                                <!-- <div class="col-md-6">
                                    <label for="companyName" class="form-label">Company Name</label>
                                    <input type="text" class="form-control" id="companyName" value="5">
                                </div> -->
                                <div class="col-12">
                                    <label for="address" class="form-label">Address</label>
                                    <textarea class="form-control" id="address" rows="2" >{{user.location}}</textarea>
                                </div>
                            </div>

                            <hr class="my-4">

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple JS for theme toggle
        document.getElementById('theme-toggle').addEventListener('change', function() {
            if (this.checked) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-bs-theme', 'light');
            }
        });
    </script>
</body>
</html>
